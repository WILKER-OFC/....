<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Api Gohan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <section class="card">
            <h2>Nueva Contraseña</h2>
            <input type="password" id="new-password" placeholder="Nueva Contraseña">
            <button onclick="resetPassword()">Actualizar Contraseña</button>
        </section>
    </div>
    <script>
        async function resetPassword() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const newPassword = document.getElementById('new-password').value;

            if (!token) return alert('Token faltante');

            try {
                const res = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();
                alert(data.message);
                if (data.status) window.location.href = '/';
            } catch (err) {
                alert('Error al restablecer contraseña');
            }
        }
    </script>
</body>
</html>
